name: Release

# On a version tag (vX.Y.Z), build the self-contained source tarball and publish it as a
# GitHub Release with its sha256, for downstream packagers (e.g. the Homebrew tap) to consume.
#
# This repo stays agnostic about how ridgerunner's DEPENDENCIES are installed: the only tools
# used here are autoconf/automake/pkg-config (the build system itself), never openblas /
# libplcurve / libtsnnls. autoreconf transforms configure.ac + Makefile.am into a prebuilt
# `configure`; it never checks for or installs the project's libraries. Testing the build
# against real dependencies across platforms is the downstream distribution's job.
#
# The tag must match the version in configure.ac (AC_INIT), e.g. tag v2.3.0 -> AC_INIT 2.3.0
# -> asset ridgerunner-2.3.0.tar.gz.

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write   # required to create the GitHub Release

jobs:
  tarball:
    name: Build source tarball and publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install the autotools build system (no project dependencies)
        run: sudo apt-get update && sudo apt-get install -y autoconf automake pkg-config

      - name: Bootstrap (autoreconf — uses no project libraries)
        run: ./autogen.sh

      - name: Assemble self-contained source tarball
        id: dist
        run: |
          VER=$(./configure --version | head -1 | awk '{print $NF}')
          DIR="ridgerunner-$VER"
          echo "Building $DIR"
          rm -rf "$DIR"; mkdir "$DIR"

          # Curated source files (attic/.github/etc. excluded via .gitattributes export-ignore).
          git archive HEAD | tar -x -C "$DIR"

          # Autoconf/automake-generated files (produced by autoreconf above; no libs involved).
          for f in configure Makefile.in config.h.in aclocal.m4 \
                   install-sh missing depcomp compile config.guess config.sub ar-lib test-driver; do
            [ -e "$f" ] && cp -a "$f" "$DIR/"
          done
          [ -d m4 ] && cp -a m4 "$DIR/"
          # Ship the freshly generated example-knot list (source of truth after autogen.sh).
          [ -e data/knotdata.am ] && cp -a data/knotdata.am "$DIR/data/"

          tar czf "$DIR.tar.gz" "$DIR"
          SHA=$(sha256sum "$DIR.tar.gz" | cut -d' ' -f1)
          sha256sum "$DIR.tar.gz" | tee "$DIR.tar.gz.sha256"
          {
            echo "version=$VER"
            echo "tarball=$DIR.tar.gz"
            echo "sha256=$SHA"
          } >> "$GITHUB_OUTPUT"

      - name: Sanity-check the tarball is self-contained and complete
        run: |
          T="${{ steps.dist.outputs.tarball }}"
          tar tzf "$T" | grep -q '/configure$'                 # ships prebuilt configure
          tar tzf "$T" | grep -q '/Makefile.in$'
          test "$(tar tzf "$T" | grep -c '\.vect$')" -ge 396   # all example knots present

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.dist.outputs.tarball }}
            ${{ steps.dist.outputs.tarball }}.sha256
          body: |
            Automated **self-contained** source release (ships a prebuilt `./configure`).

            **Asset:** `${{ steps.dist.outputs.tarball }}`
            **sha256:** `${{ steps.dist.outputs.sha256 }}`

            Build: `./configure && make && make install`. Requires the runtime dependencies
            (openblas, gsl, argtable2, libplcurve, libtsnnls, ncurses) plus `pkg-config` — see
            the downstream `designbynumbers/homebrew-cantarellalab` formula.
